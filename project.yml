name: Polishly
options:
  bundleIdPrefix: com.polishly
  deploymentTarget:
    macOS: 14.0
targets:
  Polishly:
    type: application
    platform: macOS
    sources: Sources/Polishly
    info:
      path: Polishly/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Polishly. All rights reserved."
        NSHighResolutionCapable: true
        NSServices: []
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - polishly
            CFBundleURLName: "com.polishly"
