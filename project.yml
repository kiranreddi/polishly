name: Polishly
options:
  bundleIdPrefix: com.polishly
  deploymentTarget:
    macOS: 14.0
targets:
  Polishly:
    type: application
    platform: macOS
    sources:
      - path: Sources/Polishly
      - path: Polishly/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        # A stable Team ID lets TCC (Accessibility, etc.) recognize this app
        # across rebuilds instead of treating every recompile as a new binary.
        DEVELOPMENT_TEAM: W26KHF87HS
        CODE_SIGN_STYLE: Automatic
    info:
      path: Polishly/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Polishly. All rights reserved."
        NSHighResolutionCapable: true
        NSServices: []
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - polishly
            CFBundleURLName: "com.polishly"
  PolishlyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PolishlyTests
    dependencies:
      - target: Polishly
    settings:
      GENERATE_INFOPLIST_FILE: YES
